<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0e0a08">
<title>타임 워커 — 14세기 런던</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0e0a08;
    overscroll-behavior: none;
  }
  body {
    background: radial-gradient(120% 90% at 50% 0%, #241d16 0%, #16110d 55%, #0e0a08 100%);
    background-attachment: fixed;
    color: #d8cdbc;
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    -webkit-user-select: none; user-select: none;
    display: flex; flex-direction: column; align-items: center;
  }
  #app {
    width: 100%; max-width: 420px; min-height: 100vh;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  header { padding: 16px 20px 4px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #topLabel { font-size: 12px; letter-spacing: .18em; color: #8a7c69; }
  #gauge { display: flex; gap: 6px; height: 18px; align-items: center; }
  #purse { display: inline-flex; align-items: center; gap: 4px;
    margin-left: 10px; font-size: 12px; color: #b08d4a;
    font-family: 'Noto Serif KR', serif; }
  #purse svg { width: 15px; height: 15px; }
  #purse.empty { color: #6b5b45; }
  #feedback { height: 20px; font-size: 13px; font-family: 'Noto Serif KR', serif;
    opacity: 0; transition: opacity .2s; text-align: center; }
  #feedback.show { opacity: 1; }
  #feedback.up { color: #c9403a; }
  #feedback.down { color: #7d9c6b; }

  main { flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 4px 20px 28px; width: 100%; }

  .parchment {
    width: 100%;
    background: linear-gradient(160deg, #efe4cd 0%, #e2d2b4 100%);
    color: #2a221a; border-radius: 6px;
    box-shadow: 0 18px 44px rgba(0,0,0,.55), inset 0 0 60px rgba(120,90,50,.14);
  }
  .panel { padding: 34px 26px; text-align: center; max-height: 78vh; max-height: 78dvh; overflow-y: auto; }
  h1 { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 30px;
    letter-spacing: .14em; margin: 0; }
  h2 { font-family: 'Noto Serif KR', serif; font-weight: 600; font-size: 21px;
    letter-spacing: .1em; margin: 0; }
  .rule { width: 46px; height: 2px; background: #b07f2e; margin: 16px auto 20px; }
  .body-text { font-family: 'Noto Serif KR', serif; font-size: 15.5px; line-height: 1.85;
    white-space: pre-line; text-align: left; margin: 0 0 22px; }
  .btn {
    font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 600;
    letter-spacing: .1em; background: #2a221a; color: #e8d9ba;
    border: 1px solid #4a3d2e; border-radius: 4px; padding: 14px 30px;
    width: 100%; cursor: pointer;
  }
  .btn:active { background: #3a2f24; }
  .note { font-size: 11.5px; color: #8a7455; margin: 14px 0 0; }

  .result-line {
    font-family: 'Noto Serif KR', serif; font-style: italic;
    font-size: 13.5px; line-height: 1.7; color: #7d6a4f;
    border-left: 2px solid #c4a662; padding-left: 12px;
    text-align: left; margin: 0 0 18px;
  }

  #progress { display: flex; gap: 8px; margin-bottom: 18px; min-height: 7px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #d9a441; }

  #cardZone { width: 100%; display: flex; flex-direction: column; gap: 18px; }
  #card {
    min-height: 268px; padding: 30px 26px;
    display: flex; flex-direction: column;
    touch-action: none; cursor: grab;
    overflow: hidden;
  }
  #cardInner { display: flex; flex-direction: column; flex: 1; }
  #speaker { font-size: 12px; letter-spacing: .2em; color: #8a6a33;
    margin-bottom: 14px; font-weight: 500; min-height: 12px; }
  #cardText { font-family: 'Noto Serif KR', serif; font-size: 17px;
    line-height: 1.9; margin: 0; flex: 1; white-space: pre-line; }
  #hint { text-align: center; font-size: 11.5px; color: #a58c62;
    letter-spacing: .22em; margin-top: 18px; }

  #choices { display: flex; gap: 10px; }
  .choice {
    flex: 1; font-family: 'Noto Serif KR', serif; font-size: 14.5px;
    background: rgba(30,24,18,.72); color: #a89a88;
    border: 1px solid #3d332a; border-radius: 4px; padding: 13px 8px;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  .choice.armed { border-color: #d9a441; color: #d9a441; }

  .records { text-align: left; margin: 0 0 22px; }
  .records-title { font-size: 12px; letter-spacing: .18em; color: #8a6a33;
    font-weight: 500; margin-bottom: 10px; text-align: center; }
  details { border: 1px solid #c9b58a; border-radius: 4px; margin-bottom: 8px;
    background: rgba(255,250,238,.4); }
  summary { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600;
    padding: 11px 14px; cursor: pointer; list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "\25B8 "; color: #b07f2e; }
  details[open] summary::before { content: "\25BE "; }
  .rec-body { padding: 0 14px 12px; }
  .rec-body p { font-family: 'Noto Serif KR', serif; font-size: 13.5px;
    line-height: 1.8; margin: 0 0 10px; }
  .disputed { background: rgba(140,100,40,.1); border: 1px dashed #a58248;
    border-radius: 4px; padding: 10px 12px; }
  .disputed-label { font-size: 10.5px; letter-spacing: .16em; color: #8a6a33;
    font-weight: 500; margin-bottom: 5px; }
  .rec-empty { font-family: 'Noto Serif KR', serif; font-size: 13px;
    color: #8a7455; text-align: center; padding: 8px 0; }
  .stat { font-size: 12.5px; color: #6d5c46; margin-bottom: 20px; }
  .hidden { display: none !important; }

  /* ── 채색 장면 세밀화 ── */
  .scene-min { width: 100%; display: block; margin: 0 auto 14px; }

  /* ── 장면 배경 삽화 ── */
  .band-wrap { position: relative; margin: -30px -26px 18px; }
  .band-wrap.in-panel { margin: -34px -26px 20px; }
  .band { width: 100%; display: block; border-radius: 6px 6px 0 0;
    border-bottom: 1px solid #c0a878; }
  img.band { width: 100%; height: auto; max-height: 340px; object-fit: contain;
    background: #17110c;
    filter: sepia(.12) contrast(.97) saturate(.94); }
  .art-cap { font-size: 9.5px; line-height: 1.5; color: #8a7455;
    padding: 5px 26px 0; text-align: right; letter-spacing: .02em; }
  .medallion { position: absolute; right: 10px; bottom: -18px;
    width: 44px; height: 44px; border-radius: 50%;
    background: #efe4cd; border: 1.5px solid #b07f2e;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    display: flex; align-items: center; justify-content: center; }
  .medallion svg { width: 34px; margin: 0; }

  /* ── 판화풍 비녜트 ── */
  .vignette { width: 112px; margin: 0 auto 8px; display: block; opacity: .92; }
  .vignette-lg { width: 156px; margin: 0 auto 2px; display: block; opacity: .92; }

  /* ── 장면 삽화 ── */
  .scene-art { width: 100%; max-height: 220px; object-fit: cover;
    border-radius: 4px; border: 1px solid #c9b58a;
    filter: sepia(.12) contrast(.97); display: block; margin: 0 auto 6px; }
  .art-cap { font-size: 10.5px; color: #8a7455; letter-spacing: .04em;
    margin-bottom: 16px; }

  /* ── 연출 ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); }
                      to   { opacity: 1; transform: none; } }
  .fade-in { animation: fadeUp .45s ease both; }
  #fx { position: fixed; inset: 0; pointer-events: none; opacity: 0;
    transition: opacity .9s ease; z-index: 50;
    background: radial-gradient(120% 120% at 50% 50%,
      rgba(70,10,7,.3) 0%, rgba(8,4,3,.97) 78%); }
  #fx.on { opacity: 1; }

  /* ── 타이틀 ── */
  @keyframes eyeGlow { 0%,100% { opacity: .75; } 50% { opacity: 1; } }
  .title-eye { width: 88px; margin: 4px auto 16px; animation: eyeGlow 4s ease-in-out infinite; }
  .title-sub { font-size: 11px; letter-spacing: .34em; color: #8a6a33; margin-top: 12px; }
  .tagline { font-family: 'Noto Serif KR', serif; font-size: 15px; line-height: 1.9;
    white-space: pre-line; margin: 0 0 26px; color: #4a3d2e; }

  @media (prefers-reduced-motion: reduce) {
    #card { transition: none !important; }
    .fade-in { animation: none !important; }
    .title-eye { animation: none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="topLabel">14세기 런던 · 프로토타입</div>
    <div id="gauge"></div>    <div id="feedback"></div>
  </header>
  <main>
    <div id="progress" class="hidden"></div>

    <div id="cardZone" class="hidden">
      <div id="card" class="parchment">
        <div id="cardInner">
          <div id="cardArt"></div>
          <div id="resultLine" class="result-line hidden"></div>
          <div id="speaker"></div>
          <p id="cardText"></p>
          <div id="hint">◂ 밀어서 선택 ▸</div>
        </div>
      </div>
      <div id="choices">
        <button class="choice" id="btnLeft"></button>
        <button class="choice" id="btnRight"></button>
      </div>
    </div>

    <div id="panel" class="parchment panel"></div>
  </main>
</div>
<div id="fx"></div>

<script>
/* ============================================================
   시나리오 데이터 — 실제 버전에서는 별도 JSON으로 분리
   카드 규칙:
   - 각 카드는 id를 가진다
   - 선택지에 next가 있으면 해당 id로 점프, "END"면 장면 종료
   - next가 없으면 배열 순서대로 진행 (선형 장면용)
   ============================================================ */
const SCENARIO = {
  title: "타임 워커",
  suspicionMax: 6,
  trustThreshold: 3,
  intro: "타임머신이 멈춰 선 곳은 14세기 런던 외곽. 당신은 기계를 숲에 숨기고 마을로 들어선다.\n\n이 시대의 규칙을 모른다는 것, 그것이 당신의 유일한 약점이다.\n\n무사히 지나온 장면의 기록만이 여행의 끝에 남는다.",
  scenes: [
    {
      label: "장면 1", title: "시장 거리",
      art: { file: "Medieval market.jpg",
             caption: "중세 시장 풍경 — 퍼블릭 도메인 (Wikimedia Commons)" },
      intro: "사우스워크 외곽의 시장 거리.\n\n생선 비린내와 하수 냄새가 뒤섞여 코를 찌른다. 좌판마다 호객 소리가 넘치고, 당신은 그 속에서 최대한 눈에 띄지 않으려 애쓴다.",
      cards: [
        { id: "m1", speaker: "파이 장수",
          text: "\u201c갓 구운 장어 파이요!\u201d\n\n장수가 당신의 행색을 위아래로 훑더니 값을 부른다. \u201c2펜스요.\u201d 방금 앞 손님은 절반만 내고 갔다.",
          left:  { label: "\u201c1페니면 충분하잖소\u201d", suspicion: -1, trust: 0,
                   result: "장수가 못 이기는 척 파이를 건넨다. \u201c빈틈없는 양반이군.\u201d" },
          right: { label: "부르는 대로 낸다", suspicion: 1, trust: 0,
                   result: "장수가 동전을 받으며 히죽 웃는다. 주변 좌판 상인들이 당신을 흘깃거린다." } },
        { id: "m2", speaker: "수레꾼",
          text: "당신의 신발과 말씨가 이곳 사람들과 다르다는 걸 눈치챈 모양이다.\n\n\u201c처음 보는 얼굴인데. 어디서 오셨소?\u201d",
          left:  { label: "\u201c캔터베리로 가는 길이오\u201d", suspicion: -1, trust: 0,
                   result: "\u201c베켓 성인의 가호가 있기를.\u201d 수레꾼이 고개를 끄덕이고 제 갈 길을 간다." },
          right: { label: "\u201c그건 알 것 없소\u201d", suspicion: 2, trust: 0,
                   result: "수레꾼이 눈을 가늘게 뜬다. \u201c…수상한 양반이군.\u201d 그가 옆 사람에게 뭐라 수군거린다." } },
        { id: "ale", speaker: "에일하우스 사내",
          text: "에일하우스 앞, 사람들이 나무잔을 기울인다. 한 사내가 당신에게도 잔을 밀어준다.\n\n“새 술통을 땄소. 한 잔 안 할 텐가? 검사관이 오기 전에 맛봐 둬야지.”",
          left:  { label: "받아 한 모금 마신다", suspicion: -1, trust: 0,
                   result: "텁텁한 에일이 목을 넘어간다. 함께 잔을 든 당신을, 사람들이 낯설어하지 않는다." },
          right: { label: "“물은 없소?”", suspicion: 2, trust: 0,
                   result: "사내들이 어이없다는 듯 웃는다. “강물을 마시겠다고? 병에 걸리려 작정했나.” 이상한 자로 찍혔다." } },
        { id: "m3", speaker: "",
          text: "좁은 길목에서 소년 하나가 어깨를 세게 부딪히고 지나간다.\n\n허리춤이 허전하다. 동전 주머니가 사라졌다.",
          left:  { label: "\u201c도둑이야!\u201d 소리친다", suspicion: 1, trust: 0, coins: 1,
                   result: "사람들이 몰려들자 소년이 겁먹고 주머니를 던지고 달아난다. 동전은 지켰지만, 시선을 잔뜩 끌었다." },
          right: { label: "조용히 보낸다", suspicion: 0, trust: 0, coins: -2,
                   result: "빈털터리에 가까워졌다. 대신 소란은 피했다. \u2014 이 거리에선 그게 나을지도 모른다." } },
        { id: "m4", speaker: "",
          text: "교회 종이 길게 울린다.\n\n파이 장수도, 수레꾼도 하던 일을 멈추고 고개를 숙인 채 입속으로 기도문을 왼다. 거리가 일순 조용해진다.",
          left:  { label: "계속 걷는다", suspicion: 2, trust: 0,
                   result: "기도하던 이들의 눈이 일제히 당신을 향한다. 누군가 성호를 그으며 물러선다." },
          right: { label: "따라 멈추고 고개를 숙인다", suspicion: -1, trust: 0,
                   result: "종소리가 잦아들자 거리가 다시 움직인다. 아무도 당신을 이상하게 보지 않았다." } }
      ],
      record: {
        title: "시장 거리",
        confirmed: "12세기 말 윌리엄 피츠스티븐(토머스 베켓의 서기)의 런던 묘사에는 템스 강변의 공공 조리음식점(cookshop)이 등장한다. 조리 시설이 없는 도시민과 여행자들이 익힌 음식을 사 먹는 문화는 중세 런던의 일상이었다. 낯선 여행자에게 순례는 가장 흔하고 의심받지 않는 신분이었으며, 교회 종은 도시의 하루를 구획하는 시계 역할을 했다.",
        disputed: "파이의 실제 가격, 그리고 종소리에 맞춰 거리에서 기도하는 관습(안젤루스)이 14세기 런던에서 정확히 어떤 형태였는지는 원 사료로 확인하지 못했다. 피츠스티븐의 기록도 12세기의 것이므로 14세기와는 시차가 있다."
      }
    },
    {
      label: "장면 2", title: "그로프 레인",
      intro: "골목 어귀, 낡은 표지판 하나가 걸려 있다.\n\n이 거리의 이름은 입에 올리기 민망할 만큼 노골적이다. 벽에는 줄무늬 후드를 쓴 여인 둘이 지친 얼굴로 서로 기대앉아 있다.",
      cards: [
        { id: "g1", speaker: "낯선 사내",
          text: "어느새 다가온 사내가 어깨에 손을 얹는다.\n\n\u201c형씨, 처음이지? 좋은 데 소개해 줄까?\u201d",
          left:  { label: "\u201c관심 없소\u201d", suspicion: 0, trust: 0,
                   result: "사내가 침을 뱉으며 물러난다. \u201c재수 없는 놈.\u201d" },
          right: { label: "\u201c…얼마요?\u201d", suspicion: 2, trust: 0,
                   result: "사내의 눈이 번뜩인다. \u201c봉이 하나 걸렸군.\u201d 당신은 서둘러 자리를 뜬다." } },
        { id: "g2", speaker: "",
          text: "기대앉은 여인 하나와 눈이 마주친다.\n\n짙은 화장 아래, 지친 눈빛이 당신을 가늠하고 있다.",
          left:  { label: "서둘러 지나친다", suspicion: 0, trust: 0,
                   result: "여인이 흥미를 잃은 듯 고개를 돌린다." },
          right: { label: "가볍게 목례한다", suspicion: 0, trust: 1,
                   result: "여인이 의외라는 듯 피식 웃는다. 골목 안쪽에서 젊은 여인 하나가 그 모습을 가만히 지켜보고 있다." } },
        { id: "waterman", speaker: "뱃사공",
          text: "강가 선착장에서 뱃사공이 손짓한다.\n\n“강 건너 사우스워크로 가시오? 해지기 전에 타쇼. 밤엔 스튜로 사람 못 실어 나르니까.”",
          left:  { label: "뱃삯을 치르고 오른다", suspicion: -1, trust: 0, coins: -1, need: "coins",
                   fail: { suspicion: 1, trust: 0,
                           result: "동전이 없다. 사공이 콧방귀를 뀐다. “삯도 없이 어딜. 걸어서 다리로 돌아가쇼.” 괜한 실랑이에 눈길이 모인다." },
                   result: "사공이 노를 젓는다. 자연스레 강을 건너는 당신을, 아무도 수상히 보지 않는다." },
          right: { label: "“그냥 걸어가겠소”", suspicion: 0, trust: 0,

/* ============================================================
   효과음 (Web Audio API 즉석 합성 · 외부 음원 없음)
   - 기능 감지/try-catch 가드: 미지원·실패 시 모든 호출 조용히 no-op
   - iOS 언락: 첫 제스처에서 ctx.resume() 1회
   - 음소거: 메모리 변수, 기본 켜짐
   ============================================================ */
const SFX = (function () {
  var ctx = null, ok = true, muted = false, unlocked = false;
  function getCtx() {
    if (ctx) return ctx;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { ok = false; return null; }
      ctx = new AC();
    } catch (e) { ok = false; ctx = null; }
    return ctx;
  }
  function tone(o) {
    if (muted || !ok) return;
    var c = getCtx(); if (!c) return;
    try {
      var t = c.currentTime, dur = o.dur || 0.2, vol = (o.vol != null ? o.vol : 0.1);
      var osc = c.createOscillator(), g = c.createGain();
      osc.type = o.type || "sine";
      osc.frequency.setValueAtTime(o.f0, t);
      if (o.f1 != null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, o.f1), t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t + dur + 0.03);
    } catch (e) {}
  }
  function chord(freqs, dur, vol, type) {
    for (var i = 0; i < freqs.length; i++) {
      (function (f, i) { setTimeout(function () { tone({ f0: f, dur: dur, vol: vol, type: type }); }, i * 45); })(freqs[i], i);
    }
  }
  return {
    unlock: function () {
      if (unlocked) return;
      var c = getCtx();
      if (c && c.state === "suspended") { try { c.resume(); } catch (e) {} }
      unlocked = true;
    },
    toggleMute: function () { muted = !muted; return muted; },
    isMuted: function () { return muted; },
    isOk: function () { return ok; },
    swipe: function (dir) { tone({ type: "triangle", f0: dir === "left" ? 330 : 390, f1: dir === "left" ? 230 : 290, dur: 0.09, vol: 0.06 }); },
    suspicion: function () { tone({ type: "sine", f0: 200, f1: 90, dur: 0.34, vol: 0.10 }); },
    trust: function () { chord([523.25, 659.25, 783.99], 0.5, 0.05, "sine"); },
    coin: function () { tone({ type: "square", f0: 1250, f1: 1750, dur: 0.05, vol: 0.045 }); setTimeout(function () { tone({ type: "square", f0: 1650, f1: 2150, dur: 0.045, vol: 0.035 }); }, 55); },
    transition: function () { tone({ type: "sine", f0: 300, f1: 520, dur: 0.5, vol: 0.045 }); },
    endWin: function () { chord([523.25, 659.25, 783.99, 1046.5], 0.8, 0.07, "sine"); },
    endCaught: function () { tone({ type: "sine", f0: 165, f1: 55, dur: 1.1, vol: 0.10 }); setTimeout(function () { tone({ type: "triangle", f0: 110, f1: 44, dur: 1.0, vol: 0.07 }); }, 90); }
  };
})();

/* 첫 사용자 제스처에서 iOS 오디오 언락(1회) */
(function () {
  function once() {
    try { SFX.unlock(); } catch (e) {}
    ["pointerdown", "touchstart", "click"].forEach(function (ev) { document.removeEventListener(ev, once, true); });
  }
  ["pointerdown", "touchstart", "click"].forEach(function (ev) { document.addEventListener(ev, once, true); });
})();

function refade(node) {
  node.classList.remove("fade-in");
  void node.offsetWidth;
  node.classList.add("fade-in");
}

function findCard(scene, id) {
  return scene.cards.find(c => c.id === id) || null;
}
function nextSequential(scene, id) {
  const i = scene.cards.findIndex(c => c.id === id);
  return (i >= 0 && i + 1 < scene.cards.length) ? scene.cards[i + 1].id : "END";
}

    right: { label: "슬그머니 내려놓는다", suspicion: 1,

  { id: "r_funeral", icon: "candle", scenes: [0,5,6],

    left:  { label: "함께 멈춰 성호를 긋는다", suspicion: -1,

  { id: "r_herb", icon: "bowl", scenes: [1,6], speaker: "약초 노파",
    text: "허리 굽은 노파가 마른 약초 다발을 흔든다.\n\n“열병을 막아주는 부적이라오. 한 푼이면 되네.”",
    left:  { label: "동전을 주고 받는다", coins: -1, suspicion: -1, need: "coins",
             result: "노파가 약초를 쥐여준다. 곁의 사람들이 신심 깊은 자를 보듯 고개를 끄덕인다.",

  { id: "r_firewood", icon: "grip", scenes: [0,1,5,6],

    left:  { label: "허리를 굽혀 함께 줍는다", suspicion: -1, trust: 1,

  { id: "r_minstrel", icon: "goblet", scenes: [2,4],
    text: "떠돌이 악사가 피리를 불며 사람들을 모은다.\n\n곡이 끝나자 구경꾼들이 동전을 던진다. 악사가 당신에게 눈짓한다.",
    left:  { label: "동전을 던져 준다", coins: -1, suspicion: -1, need: "coins",
             result: "악사가 익살스레 절을 한다. 당신도 흥을 아는 사람으로 보인다.",
             fail: { suspicion: 1, result: "빈손을 보이자 악사가 과장되게 실망한 시늉을 한다. 구경꾼들이 웃으며 당신을 본다." } },
    right: { label: "박수만 치고 지나간다", suspicion: 0,
             result: "몇 걸음 못 가 악사의 시선이 따라붙지만, 곧 다른 구경꾼에게로 옮겨간다." } }
];

function drawRandom(n) {
  const pick = [];
  const eligible = POOL.filter(c =>
    !S.usedRandom.has(c.id) &&
    (!c.scenes || c.scenes.indexOf(S.scene) >= 0));
  for (let i = 0; i < n && eligible.length; i++) {
    const k = Math.floor(Math.random() * eligible.length);
    const c = eligible.splice(k, 1)[0];
    if (c.once) S.usedRandom.add(c.id);
    pick.push(c);
  }
  return pick;
}

function bandHTML(sceneIdx, iconKey, inPanel) {
  const art = SCENE_ART[sceneIdx];
  if (!art) return "";
  const med = (iconKey && ICONS[iconKey])
    ? '<div class="medallion">' + icon(ICONS[iconKey], "") + '</div>' : "";
  const p = SCENE_PAINTING[sceneIdx];
  const svgTag = '<svg class="band band-svg" viewBox="0 0 320 140" ' +
    (p ? 'style="display:none" ' : '') +
    'preserveAspectRatio="xMidYMid slice">' + art + '</svg>';
  const imgTag = p
    ? '<img class="band" alt="" loading="lazy" onerror="artFail(this)" src="' +
      "https://commons.wikimedia.org/wiki/Special:FilePath/" +
      encodeURIComponent(p.file) + '?width=760">' +
      '<div class="art-cap">' + p.cap + '</div>'
    : "";
  return '<div class="band-wrap' + (inPanel ? ' in-panel' : '') + '">' +
    imgTag + svgTag + med + '</div>';
}

/* ── 의심도 게이지 ── */
const EYE_OPEN = '<svg width="30" height="18" viewBox="0 0 30 18"><path d="M2 9 Q15 -3 28 9 Q15 21 2 9 Z" fill="none" stroke="#c9403a" stroke-width="1.6"/><circle cx="15" cy="9" r="3.6" fill="#c9403a"/><circle cx="16.3" cy="7.8" r="1" fill="#1a1512"/></svg>';
const EYE_SHUT = '<svg width="30" height="18" viewBox="0 0 30 18"><path d="M4 10 Q15 15 26 10" fill="none" stroke="#57493c" stroke-width="1.6" stroke-linecap="round"/></svg>';

const COIN_SVG = '<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M5.5 8 H10.5 M8 5.5 V10.5" stroke="currentColor" stroke-width="1.4"/></svg>';

function drawGauge() {
  let h = "";
  for (let i = 0; i < SCENARIO.suspicionMax; i++) h += (i < S.suspicion ? EYE_OPEN : EYE_SHUT);
  h += '<span id="purse" class="' + (S.coins <= 0 ? "empty" : "") + '">' +
       COIN_SVG + S.coins + '</span>';
  el.gauge.innerHTML = h;
}

function flash(delta) {
  if (!delta) return;
  el.feedback.textContent = delta > 0 ? "시선이 모인다…" : "시선이 흩어진다";
  el.feedback.className = "show " + (delta > 0 ? "up" : "down");
  setTimeout(() => { el.feedback.className = ""; }, 900);
}

function show(which) {
  el.cardZone.classList.toggle("hidden", which !== "card");
  el.progress.classList.toggle("hidden", which !== "card");
  el.panel.classList.toggle("hidden", which !== "panel");
}

function takeResult() {
  const r = S.lastResult;
  S.lastResult = null;
  return r;
}

/* ============================================================
   화면
   ============================================================ */
const TITLE_EYE = '<svg viewBox="0 0 60 36" width="88" height="53"><path d="M4 18 Q30 -6 56 18 Q30 42 4 18 Z" fill="none" stroke="#b07f2e" stroke-width="2"/><circle cx="30" cy="18" r="7.5" fill="#b07f2e"/><circle cx="32.5" cy="15.5" r="2" fill="#efe4cd"/></svg>';

function screenIntro() {
  el.topLabel.textContent = "TIME WALKER";
  el.fx.classList.remove("on");
  S.scene = 0; S.cardId = null; S.step = 0;
  S.suspicion = 0; S.trust = 0; S.coins = 3;
  S.locked = false; S.lastResult = null; S.records = []; S.flags = new Set();
  S.queue = []; S.current = null; S.showingRandom = false; S.usedRandom = new Set();
  drawGauge();
  el.panel.innerHTML =
    '<div class="title-eye">' + TITLE_EYE + '</div>' +
    '<h1>타임 워커</h1>' +
    '<div class="title-sub">14세기 런던</div>' +
    '<div class="rule"></div>' +
    '<p class="tagline">당신은 이 시대의 규칙을 모른다.\n그것이 당신의 유일한 약점이다.</p>' +
    '<button class="btn" id="go">시간을 거슬러</button>' +
    '<p class="note">※ 프로토타입 — 1화 전체(7장면) 플레이 가능</p>';
  refade(el.panel);
  show("panel");
  $("go").onclick = screenPrologue;
}

function screenPrologue() {
  el.topLabel.textContent = "14세기 런던";
  el.panel.innerHTML =
    icon(ICONS.machine, "vignette-lg") +
    '<h2>프롤로그</h2><div class="rule"></div>' +
    '<p class="body-text">' + SCENARIO.intro + '</p>' +
    '<button class="btn" id="go">마을로 들어간다</button>';
  refade(el.panel);
  show("panel");
  $("go").onclick = () => screenNarration();
}

function artHTML(sc) {
  if (!sc.art) return "";
  const src = "https://commons.wikimedia.org/wiki/Special:FilePath/" +
    encodeURIComponent(sc.art.file) + "?width=640";
  return '<img class="scene-art" src="' + src + '" alt="" loading="lazy" ' +
    'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'none\'">' +
    '<div class="art-cap">' + sc.art.caption + '</div>';
}

function screenNarration() {
  const sc = SCENARIO.scenes[S.scene];
  el.topLabel.textContent = sc.label + " · " + sc.title;
  const res = takeResult();
  el.panel.innerHTML =
    bandHTML(S.scene, SCENE_ICONS[S.scene], true) +
    (res ? '<div class="result-line">' + res + '</div>' : '') +
    '<h2>' + sc.title + '</h2><div class="rule"></div>' +
    '<p class="body-text">' + sc.intro + '</p>' +
    '<button class="btn" id="go">계속</button>';
  refade(el.panel);
  show("panel");
  $("go").onclick = () => {
    S.cardId = sc.cards[0].id;
    S.step = 0;
    S.queue = drawRandom(Math.random() < 0.45 ? 2 : 1);
    screenCard();
  };
}

function screenCard() {
  const sc = SCENARIO.scenes[S.scene];
  let c, ik;
  if (S.queue.length) {
    c = S.queue[0];
    S.showingRandom = true;
    ik = c.icon;
  } else {
    c = findCard(sc, S.cardId);
    S.showingRandom = false;
    ik = (CARD_ICONS[S.scene] || {})[c.id];
  }
  S.current = c;
  el.topLabel.textContent = sc.label + " · " + sc.title;
  S.step++;

  let p = "";
  for (let i = 0; i < S.step; i++) p += '<span class="dot"></span>';
  el.progress.innerHTML = p;

  const res = takeResult();
  el.resultLine.textContent = res || "";
  el.resultLine.classList.toggle("hidden", !res);

  el.cardArt.innerHTML = bandHTML(S.scene, ik, false);

  el.speaker.textContent = c.speaker || "";
  el.cardText.textContent = c.text;
  el.btnLeft.textContent = "◂ " + c.left.label;
  el.btnRight.textContent = c.right.label + " ▸";
  el.btnLeft.classList.remove("armed");
  el.btnRight.classList.remove("armed");

  el.card.style.transition = "none";
  el.card.style.transform = "translateX(0) rotate(0deg)";
  refade(el.cardInner);
  S.locked = false;
  show("card");
}

function recordsHTML() {
  if (S.records.length === 0)
    return '<div class="records"><div class="records-title">여행의 기록</div>' +
           '<div class="rec-empty">무사히 지나온 장면이 없어, 남은 기록도 없다.</div></div>';
  let h = '<div class="records"><div class="records-title">여행의 기록</div>';
  for (const r of S.records) {
    h += '<details><summary>' + r.title + '</summary><div class="rec-body">' +
         '<p>' + r.confirmed + '</p>' +
         '<div class="disputed"><div class="disputed-label">해석 · 논쟁</div>' +
         '<p style="margin:0">' + r.disputed + '</p></div></div></details>';
  }
  return h + '</div>';
}

function resolveEnding(kind) {
  if (kind === "alone") return "forsaken";                               // 혼자 오른다 → 스스로 두고 감
  if (S.trust < SCENARIO.trustThreshold) return "alone";                 // 함께 시도했으나 신뢰 부족 → 그녀 붙잡힘
  if (S.flags.has("sawFace") && S.suspicion <= 2) return "vindicated";   // 진실 엔딩
  if (S.suspicion >= 4) return "togetherNarrow";                         // 아슬아슬한 함께
  return "together";                                                     // 깔끔한 함께
}

function screenEnding(key) {
  try { (key === "caught") ? SFX.endCaught() : SFX.endWin(); } catch (e) {}
  const e = (key === "caught")
    ? (SCENARIO.caughtEndings[S.scene] || SCENARIO.endings.caught)
    : SCENARIO.endings[key];
  el.topLabel.textContent = "TIME WALKER";
  const res = takeResult();
  el.panel.innerHTML =
    (res ? '<div class="result-line">' + res + '</div>' : '') +
    '<h1>' + e.title + '</h1><div class="rule"></div>' +
    '<p class="body-text">' + e.text + '</p>' +
    '<div class="stat">최종 의심도 ' + S.suspicion + ' / ' + SCENARIO.suspicionMax +
    ' · 신뢰 ' + S.trust + (key === "caught" ? "" : " (" + SCENARIO.trustThreshold + " 이상이면 함께 탈출)") + '</div>' +
    recordsHTML() +
    '<button class="btn" id="go">다시 시간을 거슬러</button>';
  refade(el.panel);
  show("panel");
  $("go").onclick = screenIntro;
}

/* 붙잡힘: 화면이 어두워진 뒤 엔딩으로 */
function gameOverCaught() {
  el.fx.classList.add("on");
  setTimeout(() => {
    el.fx.classList.remove("on");
    screenEnding("caught");
  }, 1100);
}

/* ============================================================
   선택 처리
   ============================================================ */
function choose(dir) {
  if (S.locked) return;
  S.locked = true;
  try { SFX.swipe(dir); } catch (e) {}

  const sc = SCENARIO.scenes[S.scene];
  const card = S.current;
  let ch = card[dir];

  /* 동전이 필요한 선택인데 없으면 실패 분기로 */
  let failed = false;
  if (ch.need === "coins" && S.coins + (ch.coins || 0) < 0) {
    failed = true;
    ch = Object.assign({}, ch, ch.fail || {}, { coins: 0, next: ch.next, ending: ch.ending });
  }

  el.card.style.transition = "transform .26s ease";
  el.card.style.transform = "translateX(" + (dir === "left" ? -460 : 460) + "px) rotate(" + (dir === "left" ? -22 : 22) + "deg)";

  setTimeout(() => {
    let d = ch.suspicion || 0;
    let t = ch.trust || 0;
    let extra = "";

    /* 지연 함정: 앞선 선택이 지금 발목을 잡는다 */
    if (ch.mod) for (const m of ch.mod) {
      if (S.flags.has(m.flag)) {
        d += (m.suspicion || 0);
        t += (m.trust || 0);
        if (m.add) extra += "\n" + m.add;
      }
    }

    S.suspicion = Math.max(0, S.suspicion + d);
    S.trust += t;
    S.coins = Math.max(0, S.coins + (ch.coins || 0));
    S.lastResult = (ch.result || "") + extra || null;
    if (ch.flag) S.flags.add(ch.flag);
    try { if (d > 0) SFX.suspicion(); else if (t > 0) SFX.trust(); if ((ch.coins || 0) < 0) SFX.coin(); } catch (e) {}
    drawGauge();
    flash(d);

    if (S.suspicion >= SCENARIO.suspicionMax) { gameOverCaught(); return; }

    /* 무작위 카드였다면 큐에서 빼고 이어서 진행 */
    if (S.showingRandom) {
      S.queue.shift();
      screenCard();
      return;
    }

    if (ch.ending) {
      S.records.push(sc.record);
      screenEnding(resolveEnding(ch.ending));
      return;
    }

    let next = ch.next || nextSequential(sc, S.cardId);
    if (typeof next === "object") next = S.flags.has(next.flag) ? next.then : next.else;
    if (next !== "END") {
      S.cardId = next;
      if (Math.random() < 0.28) S.queue = S.queue.concat(drawRandom(1));
      screenCard();
    } else {
      S.records.push(sc.record);
      if (S.scene + 1 < SCENARIO.scenes.length) {
        S.scene++;
        try { SFX.transition(); } catch (e) {}
        screenNarration();
      } else {
        screenEnding(S.trust >= SCENARIO.trustThreshold ? "together" : "alone");
      }
    }
  }, 260);
}

el.btnLeft.onclick = () => choose("left");
el.btnRight.onclick = () => choose("right");

/* ── 드래그 ── */
const TH = 70;
let dragging = false, startX = 0, dx = 0;

function dragStart(x) {
  if (S.locked) return;
  dragging = true; startX = x; dx = 0;
  el.card.style.transition = "none";
}
function dragMove(x) {
  if (!dragging || S.locked) return;
  dx = x - startX;
  el.card.style.transform = "translateX(" + dx + "px) rotate(" + (dx / 18) + "deg)";
  el.btnLeft.classList.toggle("armed", dx <= -TH);
  el.btnRight.classList.toggle("armed", dx >= TH);
}
function dragEnd() {
  if (!dragging || S.locked) return;
  dragging = false;
  if (dx <= -TH) choose("left");
  else if (dx >= TH) choose("right");
  else {
    el.card.style.transition = "transform .26s ease";
    el.card.style.transform = "translateX(0) rotate(0deg)";
    el.btnLeft.classList.remove("armed");
    el.btnRight.classList.remove("armed");
  }
}

if (window.PointerEvent) {
  el.card.addEventListener("pointerdown", e => {
    el.card.setPointerCapture(e.pointerId);
    dragStart(e.clientX);
  });
  window.addEventListener("pointermove", e => dragMove(e.clientX));
  window.addEventListener("pointerup", dragEnd);
  window.addEventListener("pointercancel", dragEnd);
} else {
  el.card.addEventListener("touchstart", e => dragStart(e.touches[0].clientX), { passive: true });
  el.card.addEventListener("touchmove", e => dragMove(e.touches[0].clientX), { passive: true });
  el.card.addEventListener("touchend", dragEnd);
  el.card.addEventListener("mousedown", e => dragStart(e.clientX));
  window.addEventListener("mousemove", e => dragMove(e.clientX));
  window.addEventListener("mouseup", dragEnd);
}

screenIntro();
</script>
